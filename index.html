<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SGH ER Floor Map</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#004a99">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SGH ER">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #004a99; }
    iframe { width: 100%; height: 100%; border: none; }
    /* Splash screen while iframe loads */
    #splash {
      position: fixed; inset: 0; z-index: 999;
      background: #004a99;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.4s;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash img { width: 120px; height: 120px; border-radius: 24px; margin-bottom: 20px; }
    #splash h1 { color: #fff; font-family: system-ui, sans-serif; font-size: 22px; font-weight: 800; }
    #splash p { color: rgba(255,255,255,0.7); font-family: system-ui, sans-serif; font-size: 13px; margin-top: 6px; }
    .spinner {
      width: 36px; height: 36px; margin-top: 30px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Install banner */
    #installBanner {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      background: #fff; padding: 16px 20px;
      display: none; align-items: center; gap: 14px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
      font-family: system-ui, sans-serif;
    }
    #installBanner img { width: 48px; height: 48px; border-radius: 12px; }
    #installBanner .info { flex: 1; }
    #installBanner .info h3 { font-size: 15px; font-weight: 700; color: #1a1a1a; }
    #installBanner .info p { font-size: 12px; color: #666; margin-top: 2px; }
    #installBanner button {
      background: #004a99; color: #fff; border: none;
      padding: 10px 22px; border-radius: 8px;
      font-size: 14px; font-weight: 700; cursor: pointer;
    }
    #installBanner .close {
      background: none; color: #999; padding: 8px;
      font-size: 20px; line-height: 1;
    }
  </style>
</head>
<body>
  <!-- Splash screen -->
  <div id="splash">
    <img src="icon-192.png" alt="ERHA">
    <h1>SGH ER Floor Map</h1>
    <p>Sangre Grande Hospital</p>
    <div class="spinner"></div>
  </div>

  <!-- GAS App iframe -->
  <iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycbwwhzzDZ_jl39qX5ucmYByZ5fTsywpUTpT7hFfNTfMHFwp2oNs21Ooom0wE70DznOhx/exec"
    allow="clipboard-write"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
  ></iframe>

  <!-- Install banner -->
  <div id="installBanner">
    <img src="icon-192.png" alt="">
    <div class="info">
      <h3>SGH ER Floor Map</h3>
      <p>Install app for quick access</p>
    </div>
    <button id="installBtn" onclick="doInstall()">Install</button>
    <button class="close" onclick="dismissInstall()">&times;</button>
  </div>

  <script>
    // Hide splash when iframe loads
    const iframe = document.getElementById('app');
    iframe.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('splash').classList.add('hide');
        setTimeout(() => document.getElementById('splash').remove(), 500);
      }, 800);
    });

    // Fallback: hide splash after 8s even if load event doesn't fire
    setTimeout(() => {
      const s = document.getElementById('splash');
      if (s) { s.classList.add('hide'); setTimeout(() => s.remove(), 500); }
    }, 8000);

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.log('SW failed:', err));
    }

    // PWA install prompt
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBanner').style.display = 'flex';
    });

    function doInstall() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('installBanner').style.display = 'none';
      });
    }

    function dismissInstall() {
      document.getElementById('installBanner').style.display = 'none';
    }

    window.addEventListener('appinstalled', () => {
      document.getElementById('installBanner').style.display = 'none';
      deferredPrompt = null;
    });
  </script>
</body>
</html>
